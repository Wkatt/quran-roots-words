    </div>

              <div class="export-item" onclick="exportDetailedRootsPDF()"><span>📄</span> PDF مفصّل</div>
              <div class="export-item" onclick="exportDetailedRootsExcel()"><span>📊</span> Excel مفصّل</div>

<script>

// ===== State =====
var rootsData={};
var rootSort='count';
var currentFilter='';
var expandedRoots={};
var maxRootCount=1;
var totalRecords=0;

var PAGE_SIZE=150;
var currentPage=1;
var currentRootsList=[];
var debounceTimer=null;

// ===== Load from pre-computed JSON =====
window.addEventListener('load', function(){
  fetch('./data/roots-stats.json')
    .then(function(r){return r.json();})
    .then(function(data){
      rootsData=data;
      totalRecords=0;
      var keys=Object.keys(rootsData);
      for(var i=0;i<keys.length;i++) totalRecords+=rootsData[keys[i]].c;
      render();
      document.getElementById('loadingScreen').style.display='none';
      document.getElementById('mainContent').style.display='block';
    })
    .catch(function(err){
      document.getElementById('loadingScreen').querySelector('.no-data-title').textContent='خطأ في تحميل البيانات: '+err.message;
    });
});

// ===== Helpers =====
function stripD(s){
  if(!s)return'';
  var r='';
  for(var i=0;i<s.length;i++){
    var c=s.charCodeAt(i);
    if(c===0x0670){r+='\u0627';continue;}
    if((c>=0x0610&&c<=0x061A)||(c>=0x064B&&c<=0x065F)||(c>=0x06D6&&c<=0x06DC)||(c>=0x06DF&&c<=0x06E4)||c===0x06E7||c===0x06E8||(c>=0x06EA&&c<=0x06ED)||c===0x0640)continue;
    if(c===0x0622||c===0x0623||c===0x0625||c===0x0671||c===0x0672||c===0x0673||c===0x0675){r+='\u0627';continue;}
    if(c===0x0624){r+='\u0648';continue;}
    if(c===0x0626){r+='\u064A';continue;}
    if(c===0x0621)continue;
    if(c===0x0629){r+='\u0647';continue;}
    r+=s[i];
  }
  return r;
}
function matchFilter(key,filter){if(!filter)return true;return stripD(key).indexOf(stripD(filter))>=0;}
function arabicCompare(a,b){return a.localeCompare(b,'ar');}
function encodeForId(s){return s.replace(/[^a-zA-Z\u0600-\u06FF]/g,'_');}
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function getRootsSorted(){
  var keys=Object.keys(rootsData);
  if(currentFilter) keys=keys.filter(function(k){return matchFilter(k,currentFilter);});
  if(rootSort==='count') keys.sort(function(a,b){return rootsData[b].c-rootsData[a].c||arabicCompare(a,b);});
  else keys.sort(function(a,b){return arabicCompare(a,b);});
  return keys;
}

// ===== Render =====
function render(){
  currentPage=1;
  currentRootsList=getRootsSorted();
  var maxR=0;
  for(var i=0;i<currentRootsList.length;i++) if(rootsData[currentRootsList[i]].c>maxR) maxR=rootsData[currentRootsList[i]].c;
  maxRootCount=maxR||1;
  document.getElementById('rootCountBadge').textContent=currentRootsList.length+' جذر';
  document.getElementById('totalBadge').textContent='الإجمالي: '+Object.keys(rootsData).length+' جذر | '+totalRecords+' سجل';

  var panel=document.getElementById('rootsPanel');
  panel.innerHTML='';
  if(!currentRootsList.length){ panel.innerHTML='<div class="empty-msg">لا توجد نتائج</div>'; return; }
  renderPage();
}

function renderPage(){
  var panel=document.getElementById('rootsPanel');
  var old=document.getElementById('loadMoreBtn');
  if(old) old.remove();

  var start=(currentPage-1)*PAGE_SIZE;
  var end=Math.min(currentPage*PAGE_SIZE, currentRootsList.length);
  var html='';
  for(var i=start;i<end;i++){
    var root=currentRootsList[i];
    var cnt=rootsData[root].c;
    var pct=Math.round(cnt/maxRootCount*100);
    var isExp=!!expandedRoots[root];
    html+='<div class="root-row'+(isExp?' expanded':'')+'" id="rr_'+encodeForId(root)+'">';
    html+='<div class="root-row-inner" onclick="toggleRoot(\''+esc(root)+'\')">';
    html+='<span class="root-arrow">▶</span>';
    html+='<span class="root-text">'+root+'</span>';
    html+='<div class="rank-bar-wrap"><div class="rank-bar-fill" style="width:'+pct+'%"></div></div>';
    html+='<span class="count-pill">'+cnt+'</span>';
    html+='</div>';
    html+='<div class="words-subtree">';
    if(isExp) html+=buildSubtreeHTML(root,expandedRoots[root]);
    html+='</div>';
    html+='</div>';
  }
  panel.insertAdjacentHTML('beforeend', html);

  if(end < currentRootsList.length){
    var remaining=currentRootsList.length-end;
    var btn=document.createElement('button');
    btn.id='loadMoreBtn';
    btn.className='load-more-btn';
    btn.textContent='تحميل المزيد ('+remaining+' متبقية)';
    btn.onclick=function(){currentPage++;renderPage();};
    panel.appendChild(btn);
  }
}

function buildSubtreeHTML(root,sort){
  var wordsArr=rootsData[root].words||[];
  if(sort==='alpha'){
    wordsArr=wordsArr.slice().sort(function(a,b){return arabicCompare(a.w,b.w);});
  }
  var maxW=0;
  for(var i=0;i<wordsArr.length;i++) if(wordsArr[i].c>maxW) maxW=wordsArr[i].c;
  maxW=maxW||1;

  var h='<div class="subtree-sort">';
  h+='<button class="sub-seg-btn'+(sort==='count'?' active':'')+'" onclick="event.stopPropagation();setSubSort(\''+esc(root)+'\',\'count\')">الأكثر</button>';
  h+='<button class="sub-seg-btn'+(sort==='alpha'?' active':'')+'" onclick="event.stopPropagation();setSubSort(\''+esc(root)+'\',\'alpha\')">هجائي</button>';
  h+='<span style="font-size:.8rem;color:#9a7a5a;margin-right:8px;">'+wordsArr.length+' صيغة</span>';
  h+='</div>';
  for(var i=0;i<wordsArr.length;i++){
    var w=wordsArr[i];
    var pct=Math.round(w.c/maxW*100);
    h+='<div class="word-item" onclick="event.stopPropagation();goSearch(\'word\',\''+esc(w.w)+'\')">';
    h+='<span class="word-text">'+w.w+'</span>';
    h+='<div class="word-bar-wrap"><div class="word-bar-fill" style="width:'+pct+'%"></div></div>';
    h+='<span class="word-count">'+w.c+'</span>';
    h+='</div>';
  }
  return h;
}

function toggleRoot(root){
  if(expandedRoots[root]) delete expandedRoots[root];
  else expandedRoots[root]='count';
  var id='rr_'+encodeForId(root);
  var row=document.getElementById(id);
  if(!row) return;
  if(expandedRoots[root]){
    row.classList.add('expanded');
    row.querySelector('.words-subtree').innerHTML=buildSubtreeHTML(root,expandedRoots[root]);
  } else {
    row.classList.remove('expanded');
    row.querySelector('.words-subtree').innerHTML='';
  }
}

function setSubSort(root,sort){
  expandedRoots[root]=sort;
  var id='rr_'+encodeForId(root);
  var row=document.getElementById(id);
  if(!row) return;
  row.querySelector('.words-subtree').innerHTML=buildSubtreeHTML(root,sort);
}

function setRootSort(sort){
  rootSort=sort;
  document.getElementById('rootSortCount').classList.toggle('active',sort==='count');
  document.getElementById('rootSortAlpha').classList.toggle('active',sort==='alpha');
  render();
}

function filterRoots(val){
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(function(){currentFilter=val.trim();render();},300);
}

function goSearch(tab,q){window.location.href='index.html?tab='+encodeURIComponent(tab)+'&q='+encodeURIComponent(q);}

// ===== Export Menus =====
function toggleMenu(id){
  var dds=document.querySelectorAll('.export-dropdown');
  for(var i=0;i<dds.length;i++){if(dds[i].id!==id)dds[i].classList.remove('open');}
  document.getElementById(id).classList.toggle('open');
}
document.addEventListener('click',function(e){
  var menus=document.querySelectorAll('.export-menu');
  for(var i=0;i<menus.length;i++){
    if(!menus[i].contains(e.target)){
      var dd=menus[i].querySelector('.export-dropdown');
      if(dd)dd.classList.remove('open');
    }
  }
});

function getDate(){return new Date().toLocaleDateString('ar-SA');}

function openPrintWindow(content){
  var win=window.open('','_blank');
  win.document.write('<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet"><style>body{font-family:Amiri,serif;direction:rtl;padding:24px;color:#1a1a1a;}.print-header{text-align:center;margin-bottom:20px;border-bottom:2px solid #c9a84c;padding-bottom:12px;}.print-header h2{color:#6b3a1f;font-size:1.4rem;}.print-header p{font-size:.9rem;color:#7a5c3a;margin-top:4px;}.print-table{width:100%;border-collapse:collapse;margin-bottom:16px;}.print-table th,.print-table td{border:1px solid #ccc;padding:8px 12px;text-align:right;}.print-table th{background:#f5e6cc;color:#6b3a1f;font-weight:bold;}@media print{@page{margin:1.5cm;}}</style></head><body>'+content+'<script>window.onload=function(){window.print();}<\/script></body></html>');
  win.document.close();
}

function getRootsData(){return getRootsSorted();}

function buildRootsPrintHTML(){
  var roots=getRootsData();var date=getDate();
  var h='<div class="print-header"><h2>إحصائيات الجذور — مستكشف القرآن العظيم</h2><p>'+roots.length+' جذر | '+date+'</p></div>';
  h+='<table class="print-table"><tr><th>#</th><th>الجذر</th><th>عدد التكرار</th></tr>';
  for(var i=0;i<roots.length;i++){
    h+='<tr><td>'+(i+1)+'</td><td style="font-size:1.2rem;">'+roots[i]+'</td><td>'+rootsData[roots[i]].c+'</td></tr>';
  }
  h+='</table>';return h;
}

function buildDetailedRootsPrintHTML(){
  var roots=getRootsData();var date=getDate();
  var h='<div class="print-header"><h2>إحصائيات الجذور — نسخة مفصّلة</h2><p>'+roots.length+' جذر | '+date+'</p></div>';
  for(var i=0;i<roots.length;i++){
    var root=roots[i];var rd=rootsData[root];
    h+='<table class="print-table" style="margin-bottom:14px;">';
    h+='<tr><th colspan="3" style="background:#f0e0c0;font-size:1.15rem;">'+(i+1)+'. '+root+' — '+rd.c+' تكرار | '+rd.words.length+' صيغة</th></tr>';
    h+='<tr><th>#</th><th>الصيغة</th><th>عدد التكرار</th></tr>';
    for(var j=0;j<rd.words.length;j++){
      h+='<tr><td>'+(j+1)+'</td><td style="font-size:1.1rem;">'+rd.words[j].w+'</td><td>'+rd.words[j].c+'</td></tr>';
    }
    h+='</table>';
  }
  return h;
}

function printRoots(){
  var pa=document.getElementById('printArea');
  pa.innerHTML=buildRootsPrintHTML();
  pa.style.display='block';
  setTimeout(function(){window.print();pa.style.display='none';},100);
}

function exportRootsPDF(){
  document.getElementById('rootExportDD').classList.remove('open');
  openPrintWindow(buildRootsPrintHTML());
}

function exportDetailedRootsPDF(){
  document.getElementById('rootExportDD').classList.remove('open');
  openPrintWindow(buildDetailedRootsPrintHTML());
}

function exportRootsExcel(){
  document.getElementById('rootExportDD').classList.remove('open');
  var roots=getRootsData();
  var wb=XLSX.utils.book_new();
  var rows=[['#','الجذر','عدد التكرار']];
  for(var i=0;i<roots.length;i++) rows.push([i+1,roots[i],rootsData[roots[i]].c]);
  var ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:5},{wch:20},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws,'الجذور');
  XLSX.writeFile(wb,'إحصائيات_الجذور.xlsx');
}

function exportDetailedRootsExcel(){
  document.getElementById('rootExportDD').classList.remove('open');
  var roots=getRootsData();
  var wb=XLSX.utils.book_new();
  var rows=[['#','الجذر','عدد التكرار','الصيغة','عدد تكرار الصيغة']];
  var num=0;
  for(var i=0;i<roots.length;i++){
    var root=roots[i];var rd=rootsData[root];
    for(var j=0;j<rd.words.length;j++){
      num++;
      rows.push([num,root,rd.c,rd.words[j].w,rd.words[j].c]);
    }
  }
  var ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:5},{wch:20},{wch:14},{wch:22},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws,'الجذور مع الصيغ');
  XLSX.writeFile(wb,'إحصائيات_الجذور_مفصّلة.xlsx');
}
