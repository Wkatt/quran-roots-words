
# منع الكاش على ملفات JS و HTML — يضمن وصول التحديثات لكل المستخدمين فوراً
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://api.quran.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net https://static-cdn.tarteel.ai; img-src 'self' data:; connect-src 'self' https://vsmpqiqmlnbxiihebtoo.supabase.co https://api.quran.com https://cdn.jsdelivr.net https://www.googletagmanager.com https://www.google-analytics.com https://static-cdn.tarteel.ai; frame-ancestors 'none';"

[build]
publish = "."
